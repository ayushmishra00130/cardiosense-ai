<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CardioSense AI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_extras %}{% endblock %}
</head>
<body data-page="{% block page_id %}home{% endblock %}">
<header class="topbar">
    <div class="topbar-inner">
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="{{ url_for('home') }}" class="{% if request.path == '/' %}is-active{% endif %}">Home</a>
            <span class="nav-separator" aria-hidden="true">|</span>
            <a href="{{ url_for('assess') }}" class="{% if request.path == '/assess' %}is-active{% endif %}">Assessment</a>
            <span class="nav-separator" aria-hidden="true">|</span>
            <a href="{{ url_for('results') }}" class="{% if request.path == '/results' %}is-active{% endif %}">Result</a>
            <span class="nav-separator" aria-hidden="true">|</span>
            <a href="{{ url_for('assess') }}" class="{% if request.path == '/assess' %}is-active{% endif %}">Start Assessment</a>
        </nav>
    </div>
</header>

<main class="page-shell">
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <p class="footer-alert">If you are having a medical emergency, contact emergency services immediately.</p>
</footer>

{% block page_data %}{% endblock %}
<script src="{{ url_for('static', filename='script.js') }}" defer></script>
{% block scripts %}{% endblock %}
</body>
</html>
